services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      PYTHONUNBUFFERED: 1
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    networks:
      - net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    networks:
      - net

  worker:
    build: ./app
    container_name: email_worker
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
    env_file:
      - .env
    depends_on:
      - rabbitmq
    restart: always
    volumes:
      - ./app:/app 
    networks:
      - net
    command: ["python", "worker.py"] 
  
  api:
    build: ./api
    container_name: email_api
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
    env_file:
      - .env
    depends_on:
      - rabbitmq
    restart: always
    ports:
      - "3500:3500"
      - "3500:3500"
    volumes:
      - ./api:/api 
    networks:
      - net
    command: ["python", "main.py"] 

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net

volumes:
  rabbitmq_data:
  postgres_data:

networks:
  net:
    driver: bridge 